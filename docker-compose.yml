services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      TARGETSAFE_MODE: cpu-demo
    volumes:
      - ./outputs:/app/outputs
      - ./work:/app/work
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"
